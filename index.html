<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JGYSTORE - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #343a40; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">JGYSTORE | Gestión de Inventario</a>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-4">
            <div class="card-body">
                <form action="/actualizar_tasa" method="post" class="row g-3">
                    <div class="col-auto"><strong>Tasa BCV:</strong></div>
                    <div class="col-auto"><input type="number" step="0.01" name="tasa" class="form-control" value="{{ tasa }}"></div>
                    <div class="col-auto"><button type="submit" class="btn btn-primary">Actualizar</button></div>
                </form>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form action="/agregar" method="post" class="row g-3">
                    <div class="col-md-4"><input type="text" name="nombre" class="form-control" placeholder="Producto" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="costo" class="form-control" placeholder="Costo $" required></div>
                    <div class="col-md-2"><input type="number" step="0.1" name="margen" class="form-control" placeholder="Margen %" required></div>
                    <div class="col-md-2"><input type="number" name="stock" class="form-control" placeholder="Stock" required></div>
                    <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Guardar</button></div>
                    <input type="hidden" name="categoria" value="General">
                </form>
            </div>
        </div>

        <table class="table table-striped bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Costo ($)</th>
                    <th>Precio ($)</th>
                    <th>Precio (Bs)</th>
                    <th>Stock</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p.nombre }}</td>
                    <td>{{ p.costo }}</td>
                    <td>{{ "%.2f"|format(p.precio_dolar) }}</td>
                    <td class="text-primary"><strong>{{ "%.2f"|format(p.precio_bs) }}</strong></td>
                    <td>{{ p.stock }}</td>
                    <td>
                        <form action="/eliminar/{{ p.id }}" method="post">
                            <button class="btn btn-danger btn-sm">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
