<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gystore | Panel Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 250px; background: var(--dark); height: 100vh; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { color: var(--primary); }
        .nav-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: none; border: none; color: white; text-align: left; cursor: pointer; border-radius: 8px; }
        .nav-btn:hover { background: #1e293b; }
        .main-content { margin-left: 280px; padding: 40px; width: 100%; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; float: right; }
        
        /* Modal Style */
        #modalForm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 400px; margin: 100px auto; padding: 30px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>GYSTORE</h2>
    <p>Sistema Adaptativo</p>
    <hr>
    <button class="nav-btn" onclick="showSection('dash')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showSection('inv')">📦 Inventario</button>
    <button class="nav-btn" onclick="alert('Generando reporte PDF...')">📋 Reportes</button>
</div>

<div class="main-content">
    <button class="btn-add" onclick="document.getElementById('modalForm').style.display='block'">+ Nuevo Producto</button>
    
    <div id="section-dash">
        <h1>Dashboard General</h1>
        <div class="card-grid">
            <div class="card"><h3>Tasa BCV</h3><h2 id="tasaText">Cargando...</h2></div>
            <div class="card"><h3>Total Productos</h3><h2 id="totalProd">0</h2></div>
            <div class="card"><h3>Alertas</h3><h2 style="color:red">0</h2></div>
        </div>
        <div class="card" style="max-width: 500px;"><canvas id="stockChart"></canvas></div>
    </div>

    <div id="section-inv" style="display:none">
        <h1>Lista de Inventario</h1>
        <table>
            <thead><tr><th>Producto</th><th>Stock</th><th>Ref. USD</th><th>Precio Bs.</th><th>Estado</th></tr></thead>
            <tbody id="tablaBody"></tbody>
        </table>
    </div>
</div>

<div id="modalForm">
    <div class="modal-content">
        <h3>Registrar Nuevo Producto</h3>
        <form action="/crear-producto-web" method="post">
            <input type="text" name="nombre" placeholder="Nombre del Producto" required>
            <input type="number" step="0.01" name="costo" placeholder="Costo en USD" required>
            <input type="number" name="margen" placeholder="Margen Ganancia %" value="30">
            <input type="number" name="stock" placeholder="Cantidad Inicial" required>
            <input type="hidden" name="categoria" value="General">
            <input type="hidden" name="minimo" value="5">
            <button type="submit" class="btn-add" style="float:none; width:100%">Guardar en Sistema</button>
            <button type="button" onclick="document.getElementById('modalForm').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer">Cancelar</button>
        </form>
    </div>
</div>

<script>
    function showSection(section) {
        document.getElementById('section-dash').style.display = section === 'dash' ? 'block' : 'none';
        document.getElementById('section-inv').style.display = section === 'inv' ? 'block' : 'none';
    }

    async function cargarDatos() {
        const response = await fetch('/productos/');
        const data = await response.json();
        
        if(data.length > 0) {
            document.getElementById('tasaText').innerText = data[0].tasa + " Bs.";
            document.getElementById('totalProd').innerText = data.length;
        }

        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        data.forEach(p => {
            tbody.innerHTML += `<tr>
                <td>${p.nombre}</td>
                <td>${p.stock}</td>
                <td>$${p.ref_usd}</td>
                <td>${p.precio_bs} Bs.</td>
                <td>${p.estado}</td>
            </tr>`;
        });
        
        // Actualizar Gráfica
        const ctx = document.getElementById('stockChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: data.map(p => p.nombre),
                datasets: [{ data: data.map(p => p.stock), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }]
            }
        });
    }
    cargarDatos();
</script>
</body>
</html>
