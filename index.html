<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JGYSTORE - Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Gestión de Inventario JGYSTORE</h2>

        <div class="card shadow mb-5">
            <div class="card-body">
                <form action="/agregar" method="post" class="row g-3">
                    <div class="col-md-4"><input type="text" name="nombre" class="form-control" placeholder="Producto" required></div>
                    <div class="col-md-2"><input type="text" name="categoria" class="form-control" placeholder="Categoría" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="costo" class="form-control" placeholder="Costo USD" required></div>
                    <div class="col-md-2"><input type="number" step="0.01" name="margen" class="form-control" placeholder="Margen %" required></div>
                    <div class="col-md-1"><input type="number" name="stock" class="form-control" placeholder="Stock" required></div>
                    <div class="col-md-1"><input type="number" name="stock_min" class="form-control" placeholder="Mín" required></div>
                    <div class="col-12"><button type="submit" class="btn btn-primary w-100">Registrar Producto</button></div>
                </form>
            </div>
        </div>

        <div class="table-responsive bg-white p-3 shadow rounded">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Producto / Categoría</th>
                        <th>Costo</th>
                        <th>Venta</th>
                        <th>Stock / Mín</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in productos %}
                    <tr>
                        <form action="/editar/{{ p.id }}" method="post">
                            <td>
                                <input type="text" name="nombre" value="{{ p.nombre }}" class="form-control form-control-sm mb-1">
                                <input type="text" name="categoria" value="{{ p.categoria }}" class="form-control form-control-sm text-muted">
                            </td>
                            <td><input type="number" step="0.01" name="costo" value="{{ p.costo_usd }}" class="form-control form-control-sm"></td>
                            <td class="fw-bold text-success">${{ "%.2f"|format(p.costo_usd * (1 + p.margen_ganancia/100)) }}</td>
                            <td>
                                <input type="number" name="stock" value="{{ p.stock_actual }}" class="form-control form-control-sm mb-1">
                                <input type="number" name="stock_min" value="{{ p.stock_minimo }}" class="form-control form-control-sm">
                            </td>
                            <td class="text-center">
                                <input type="hidden" name="margen" value="{{ p.margen_ganancia }}">
                                <button type="submit" class="btn btn-sm btn-outline-success mb-1 w-100">Actualizar</button>
                            </form>
                                <form action="/eliminar/{{ p.id }}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger w-100">Borrar</button>
                                </form>
                            </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
